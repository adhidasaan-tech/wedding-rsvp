<!DOCTYPE html>
<html>
<head>
    <title>Wedding RSVP</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f8f4ef;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            margin:0;
        }

        .card{
            width:450px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,0,0,0.1);
            text-align:center;
        }

        h1{
            color:#b07a2d;
        }

        input,select{
            width:100%;
            padding:10px;
            margin-top:8px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
            box-sizing:border-box;
        }

        button{
            background:#b07a2d;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }
    </style>
</head>

<body>

<div class="card">

    <h1>💍 Wedding RSVP</h1>

    <form id="rsvpForm">

        <label><b>House Name</b></label>
        <input type="text" id="houseName" required>

        <label><b>Family Head Name</b></label>
        <input type="text" id="familyHeadName" required>

        <label><b>Will You Attend?</b></label>
        <select id="attend">
            <option>Yes</option>
            <option>No</option>
        </select>

        <label><b>Number of Members</b></label>
        <input type="number" id="members" min="1" required>

        <button type="submit">Submit RSVP</button>

    </form>

</div>

<script>

document.getElementById("rsvpForm").addEventListener("submit", function(e){

    e.preventDefault();

    fetch("https://script.google.com/macros/s/AKfycbwWK-tuaafSjfChpqmQ4XO0apIVWqwQsXlcjd4NjIZFM3fSgLsBBJaD3Xaqr2d-2CGG/exec", {
        method: "POST",
        body: JSON.stringify({
            houseName: document.getElementById("houseName").value,
            familyHeadName: document.getElementById("familyHeadName").value,
            attend: document.getElementById("attend").value,
            members: document.getElementById("members").value
        })
    })
    .then(() => {
        window.location.href = "thankyou.html";
    })
    .catch(err => {
        alert("Error submitting RSVP");
        console.log(err);
    });

});

</script>

</body>
</html>
