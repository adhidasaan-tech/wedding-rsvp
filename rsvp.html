<!DOCTYPE html>
<html>
<head>
    <title>Wedding RSVP</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f8f4ef;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .card{
            background:white;
            padding:40px;
            width:500px;
            border-radius:15px;
            box-shadow:0 4px 15px rgba(0,0,0,0.1);
            text-align:center;
        }

        h1{
            color:#b07a2d;
        }

        h2{
            color:#7a4b4b;
        }

        input,select{
            width:95%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            background:#b07a2d;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#996515;
        }

    </style>
</head>

<body>

<div class="card">

    <h1>💍 Adithyan & Ananya</h1>

    <h2>Wedding RSVP</h2>

    <p>Please confirm your attendance.</p>

    <hr>

    <form onsubmit="thankYou(event)">

        <label><b>House Name</b></label><br>
        <input type="text" placeholder="Enter House Name" required>

        <label><b>Family Head Name</b></label><br>
        <input type="text" placeholder="Enter Name" required>

        <label><b>Will You Attend?</b></label><br>

        <select>
            <option>Yes</option>
            <option>No</option>
        </select>

        <label><b>Number of Members</b></label><br>
        <input type="number" min="1" required>

        <br>

        <button type="submit">Submit RSVP</button>

    </form>

</div>

<script>

function thankYou(event){

    event.preventDefault();

    window.location.href = "thankyou.html";

}

</script>

</body>
</html>
