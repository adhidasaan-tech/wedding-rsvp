<!DOCTYPE html>
<html>
<head>
    <title>Thank You</title>

    <style>

        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f8f4ef;
            font-family:Arial, sans-serif;
        }

        .card{
            background:white;
            padding:50px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 5px 20px rgba(0,0,0,0.15);
            width:500px;
        }

        h1{
            color:#b07a2d;
            font-size:40px;
        }

        p{
            font-size:20px;
            color:#555;
        }

        a{
            display:inline-block;
            margin-top:20px;
            padding:12px 25px;
            background:#b07a2d;
            color:white;
            text-decoration:none;
            border-radius:10px;
        }

        a:hover{
            background:#996515;
        }

    </style>
</head>

<body>

<div class="card">

    <h1>🎉 Thank You!</h1>

    <p>Your RSVP has been submitted successfully.</p>

    <p>We look forward to celebrating our special day with you.</p>

    <a href="index.html">Back to Invitation</a>

</div>

</body>
</html>
